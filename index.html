<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>More like this</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#f0f0f0;font-family:'Segoe UI',-apple-system,Arial,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
.page{max-width:480px;margin:0 auto;padding:10px 10px 40px}
.hero{padding:12px 0 8px}
.hero h1{font-size:16px;font-weight:600;color:#ccc;margin-bottom:2px}
.hero p{font-size:11px;color:#444}
.feed{display:flex;flex-direction:column;gap:8px}
.card{background:#111;border:1px solid #1a1a1a;border-radius:10px;overflow:hidden;text-decoration:none;display:block;transition:transform .12s;color:#fff}
.card:active{transform:scale(.98)}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#0a0a0a}
.card-body{padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
.card-label{font-size:12px;color:#bbb;flex:1}
.card-arrow{font-size:11px;color:#666;padding-left:8px}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#333;margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.section-label .dot{width:5px;height:5px;background:#ff4500;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.thumb{background:#111;border-radius:8px;overflow:hidden;text-decoration:none;display:block;border:1px solid #1a1a1a;transition:border-color .12s}
.thumb:active{transform:scale(.97)}
.thumb img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#0a0a0a}
.thumb-info{padding:5px 7px}
.thumb-name{font-size:11px;font-weight:500;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thumb-sub{font-size:9px;color:#444}
.footer{text-align:center;font-size:8px;color:#181818;line-height:1.8;margin-top:16px;padding:0 20px}
.footer a{color:#222;text-decoration:none}
.skel{background:linear-gradient(90deg,#111 25%,#1a1a1a 50%,#111 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;aspect-ratio:4/3}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <h1 id="heroTitle">more like this</h1>
    <p>tap to continue</p>
  </div>

  <!-- Main feed — populated by API -->
  <div class="feed" id="feed">
    <div style="padding:20px;text-align:center"><div class="skel" style="aspect-ratio:16/9;margin-bottom:6px"></div><div class="skel" style="aspect-ratio:16/9"></div></div>
  </div>

  <!-- Scrollable grid -->
  <div class="section-label"><div class="dot"></div>more girls live now</div>
  <div class="grid" id="grid1"><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>

  <div class="section-label">you might also like</div>
  <div class="grid3" id="grid2"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>

  <div class="section-label">trending this week</div>
  <div class="grid" id="grid3"><div class="skel"></div><div class="skel"></div></div>

  <!-- AdultForce -->
  <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px">
    <iframe width="300" height="250" scrolling="no" frameborder="0" src="https://a.adtng.com/get/10016724" allowtransparency="true" marginheight="0" marginwidth="0" name="spot_id_10016724" style="border-radius:8px;overflow:hidden"></iframe>
  </div>

  <div class="footer">
    18+ only &bull; <a href="https://reddit.com/r/chibigbootygirls">r/chibigbootygirls</a>
  </div>

</div>

<script>
var CB='https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=StgxX&client_ip=1.1.1.1&gender=f&format=json';

function fv(n){return n>=1000?(n/1000).toFixed(1)+'k':n}

// Casual captions that feel human
var captions=[
  "she didn't stop after this","more from her","this gets better","yeah there's more lol",
  "she's still going","more of this","full thing here","she went off","still live rn",
  "way more here","this one's wild","she keeps going","more from tonight",
  "couldn't stop watching","there's a part 2","she's on rn","more where this came from"
];
function cap(){return captions[Math.floor(Math.random()*captions.length)]}

function mkThumb(m){
  return '<a class="thumb" href="'+m.chat_room_url_revshare+'" target="_blank" rel="noopener">'
    +'<img src="'+m.image_url+'" alt="" loading="lazy">'
    +'<div class="thumb-info"><div class="thumb-name">'+cap()+'</div>'
    +'<div class="thumb-sub">'+fv(m.num_users)+' watching</div></div></a>';
}

async function load(){
  try{
    // Pull 18 models to fill all sections
    var r=await fetch(CB+'&limit=18&offset='+Math.floor(Math.random()*50));
    var d=await r.json();
    var rooms=d.results||[];
    if(rooms.length<6) return;

    // Top feed — 2 big cards
    var feed=document.getElementById('feed');
    feed.innerHTML=rooms.slice(0,2).map(function(m){
      return '<a class="card" href="'+m.chat_room_url_revshare+'" target="_blank" rel="noopener">'
        +'<img class="card-img" src="'+m.image_url+'" alt="" loading="eager">'
        +'<div class="card-body"><div class="card-label">'+cap()+'</div>'
        +'<div class="card-arrow">'+fv(m.num_users)+' watching &rarr;</div></div></a>';
    }).join('');

    // Grid 1 — 4 thumbs
    document.getElementById('grid1').innerHTML=rooms.slice(2,6).map(mkThumb).join('');

    // Grid 2 — 3 thumbs
    document.getElementById('grid2').innerHTML=rooms.slice(6,9).map(mkThumb).join('');

    // Grid 3 — 2 thumbs
    document.getElementById('grid3').innerHTML=rooms.slice(9,11).map(mkThumb).join('');

  }catch(e){}
}
load();
setInterval(load,90000);

// URL param variants
var p=new URLSearchParams(location.search);
var t=p.get('t');
var h=document.getElementById('heroTitle');
if(t==='more') h.textContent='more from her';
else if(t==='full') h.textContent='full set';
else if(t==='source') h.textContent='source + more';
else if(t==='creator') h.textContent='more from this creator';
else if(t==='part2') h.textContent='part 2';
</script>
</body>
</html>
